<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>匿名聊天後台管理員</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h1 class="text-3xl font-bold text-gray-800">匿名聊天中控台 (Local Admin)</h1>
            <div class="flex items-center gap-4 p-3 bg-white rounded-lg shadow w-full md:w-auto">
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-600 font-bold whitespace-nowrap">閒置房間保留 (小時):</label>
                    <input type="number" id="timeoutInput"
                        class="border rounded p-1 w-16 text-center focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="setTimeoutVal()"
                        class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600 transition">套用</button>
                </div>
                <button onclick="toggleEmergency()" id="emergencyBtn"
                    class="bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600 font-bold transition-colors">
                    啟動緊急停止配對
                </button>
            </div>
        </div>

        <!-- Health Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm">硬體 CPU (Load)</h3>
                <p class="text-2xl font-bold" id="val_cpu">--</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm">記憶體 RAM 佔用</h3>
                <p class="text-2xl font-bold" id="val_ram">--</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm">每秒吞吐量 (MPS)</h3>
                <p class="text-2xl font-bold text-green-600" id="val_mps">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-purple-500">
                <h3 class="text-gray-500 text-sm">平均聊天時長</h3>
                <p class="text-2xl font-bold" id="val_duration">-- 秒</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-orange-500">
                <h3 class="text-gray-500 text-sm">當前連線人數</h3>
                <p class="text-2xl font-bold" id="val_users">--</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-orange-500">
                <h3 class="text-gray-500 text-sm">正在排隊人數</h3>
                <p class="text-2xl font-bold" id="val_waiting">--</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm">大廳孤兒率</h3>
                <p class="text-2xl font-bold text-red-600" id="val_orphan">--</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 檢舉跑馬燈 -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">即時檢舉跑馬燈 (近50筆)</h2>
                <div class="overflow-y-auto max-h-[400px]" id="reportFeed">
                    <!-- Reports go here -->
                </div>
            </div>

            <!-- 處罰名單 -->
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">秩序與懲罰名冊</h2>
                <div class="space-y-4 overflow-y-auto max-h-[400px]">
                    <div>
                        <h3 class="font-bold text-orange-600">地獄池 (Hell Pool 隔離中)</h3>
                        <ul id="list_hell" class="text-sm text-gray-600 mt-2 space-y-2"></ul>
                    </div>
                    <div>
                        <h3 class="font-bold text-red-500">異常秒退標記 (Red Flags)</h3>
                        <ul id="list_red" class="text-sm text-gray-600 mt-2 space-y-2"></ul>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">永久黑名單 (Perma-Bans)</h3>
                        <ul id="list_perma" class="text-sm text-gray-600 mt-2 space-y-2"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();

                document.getElementById('val_cpu').innerText = data.health.cpu;
                document.getElementById('val_ram').innerText = data.health.ram;
                document.getElementById('val_mps').innerText = data.health.mps;
                document.getElementById('val_duration').innerText = data.quality.avgChatDurationSeconds + ' 秒';
                document.getElementById('val_users').innerText = data.quality.usersConnected;
                document.getElementById('val_waiting').innerText = data.quality.usersWaiting;
                document.getElementById('val_orphan').innerText = data.quality.orphanRatio;

                // Update Emergency Button
                const eBtn = document.getElementById('emergencyBtn');
                if (data.controls.isEmergencyStop) {
                    eBtn.innerText = "🚨 系統已緊急停止 (點擊恢復)";
                    eBtn.className = "bg-green-500 text-white px-4 py-2 rounded shadow hover:bg-green-600 font-bold transition-colors animate-pulse";
                } else {
                    eBtn.innerText = "啟動緊急停止配對";
                    eBtn.className = "bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600 font-bold transition-colors";
                }

                // Update Timeout Value if not currently focused
                const tInput = document.getElementById('timeoutInput');
                if (document.activeElement !== tInput) {
                    tInput.value = data.controls.idleTimeoutHours;
                }

                // Reports
                const reportHTML = data.moderation.recentReports.map(r =>
                    `<div class="text-sm p-2 border-b bg-gray-50 flex justify-between">
                    <span class="text-gray-500">[${new Date(r.time).toLocaleTimeString()}]</span>
                    <span>用戶 <span class="text-blue-600">${r.reporterHash}</span> 檢舉了 <span class="text-red-600 font-bold">${r.targetHash.slice(0, 8)}</span></span>
                </div>`
                ).join('');
                document.getElementById('reportFeed').innerHTML = reportHTML || '<p class="text-gray-400 text-sm">目前無任何檢舉記錄</p>';

                // Lists
                const buildList = (ips, type) => ips.map(ip =>
                    `<li class="flex justify-between items-center bg-gray-50 p-2 rounded border">
                   <span class="font-mono text-xs">${ip}</span>
                   <div class="space-x-2">
                     <button onclick="takeAction('unban', '${ip}')" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200">特赦</button>
                     ${type !== 'perma' ? `<button onclick="takeAction('permaban', '${ip}')" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">永Ban</button>` : ''}
                   </div>
                 </li>`
                ).join('');

                document.getElementById('list_hell').innerHTML = buildList(data.moderation.hellPoolUsers, 'hell') || '<li class="text-gray-400 text-xs">空</li>';
                document.getElementById('list_red').innerHTML = buildList(data.moderation.redFlags, 'red') || '<li class="text-gray-400 text-xs">空</li>';
                document.getElementById('list_perma').innerHTML = buildList(data.moderation.permaBans, 'perma') || '<li class="text-gray-400 text-xs">空</li>';

            } catch (err) {
                console.error(err);
            }
        }

        async function toggleEmergency() {
            await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'emergency_stop' })
            });
            fetchMetrics();
        }

        async function takeAction(action, ipHash) {
            if (action === 'permaban' && !confirm('確定要永久封鎖此 IP 嗎？他將立刻被踢下線且永遠無法配對。')) return;

            await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ipHash })
            });
            fetchMetrics();
        }

        async function setTimeoutVal() {
            const val = document.getElementById('timeoutInput').value;
            if (!val || val < 1) return alert('請輸入大於 1 的整數數字');

            await fetch('/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'set_timeout', value: val })
            });
            alert('套用成功！閒置房間將保留 ' + val + ' 小時。');
            fetchMetrics();
        }

        // 每兩秒更新一次數據
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>

</html>
